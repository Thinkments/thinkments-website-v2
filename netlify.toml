[build]
  command = "npm install && npm run build"
  publish = "build"
  functions = "src/netlify/functions"

# Force HTTPS - redirect all HTTP to HTTPS (consolidate canonical URLs)
[[redirects]]
  from = "http://thinkments.com/*"
  to = "https://thinkments.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.thinkments.com/*"
  to = "https://thinkments.com/:splat"
  status = 301
  force = true

# Redirect www to non-www (canonical domain)
[[redirects]]
  from = "https://www.thinkments.com/*"
  to = "https://thinkments.com/:splat"
  status = 301
  force = true

# API Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA routing - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Password protect ONLY admin pages (requires Netlify Pro)
[[headers]]
  for = "/admin/*"
  [headers.values]
    Basic-Auth = "admin:ThinkMents2025"

# Global Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Basic CSP - Note: Vite requires 'unsafe-inline' for styles sometimes, and eval for some dev tools or certain packages.
    # Trusted Types mitigate DOM XSS.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-src 'self' https:; require-trusted-types-for 'script';"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/functions"]


# Skip Next.js plugin - this is a React/Vite project
[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Enable Lighthouse performance testing
[[plugins]]
  package = "@netlify/plugin-lighthouse"
